name: Manual Windows Binary Build
on:
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # This points to where the package.json actually lives
          cache-dependency-path: './package.json' 

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Dependencies
        # If your package.json is in a subfolder, change "." to that folder name (e.g., "./bindings/node")
        run: npm install

      - name: Build Native Module
        run: |
          # We use npx to ensure the napi-rs CLI is available
          npx napi build --platform --release --arch x64

      - name: Upload Compiled Binary
        uses: actions/upload-artifact@v4
        with:
          name: ows-core-windows-x64
          # This glob finds the .node file regardless of which folder it landed in
          path: |
            *.node
            ./build/Release/*.node
            ./artifacts/*.node
